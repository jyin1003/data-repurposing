<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Repurposed Dataset Collection</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=JetBrains+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap"
    rel="stylesheet">
  <style>
    :root {
      --bg: #0d0d0f;
      --surface: #13131a;
      --surface2: #1a1a24;
      --border: #2a2a38;
      --accent: #c8a96e;
      --accent2: #7c6fcd;
      --accent3: #5bbf9c;
      --text: #e8e6df;
      --muted: #7a7890;
      --tag-bg: #1e1e2e;
      --tag-border: #33334a;
      --select-ring: #c8a96e;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-weight: 300;
      min-height: 100vh;
      line-height: 1.6;
    }

    /* ── Header ── */
    header {
      border-bottom: 1px solid var(--border);
      padding: 2rem 3rem 1.5rem;
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 2rem;
      flex-wrap: wrap;
      background: linear-gradient(to bottom, #0a0a12, var(--bg));
      position: sticky;
      top: 0;
      z-index: 50;
    }

    .header-left h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(1.4rem, 2.5vw, 2rem);
      font-weight: 600;
      color: var(--text);
      line-height: 1.1;
    }

    .header-left h1 span {
      color: var(--accent);
      font-style: italic;
    }

    .dataset-count {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.65rem;
      color: var(--muted);
      margin-top: 0.35rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .controls {
      display: flex;
      gap: 0.6rem;
      align-items: center;
      flex-wrap: wrap;
    }

    .search-wrap {
      position: relative;
    }

    .search-wrap svg {
      position: absolute;
      left: 0.75rem;
      top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
      pointer-events: none;
    }

    #search {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 0.5rem 0.85rem 0.5rem 2.2rem;
      border-radius: 6px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.85rem;
      width: 220px;
      outline: none;
      transition: border-color 0.2s;
    }

    #search:focus {
      border-color: var(--accent2);
    }

    #search::placeholder {
      color: var(--muted);
    }

    select,
    .btn {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 0.5rem 0.85rem;
      border-radius: 6px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.85rem;
      cursor: pointer;
      outline: none;
      transition: border-color 0.2s, background 0.2s;
    }

    select:focus,
    .btn:hover {
      border-color: var(--accent2);
      background: var(--surface);
    }

    /* ── Compare bar (sticky, shown when ≥1 selected) ── */
    #compare-bar {
      position: sticky;
      top: 0;
      /* will be calculated in JS */
      z-index: 49;
      background: var(--surface2);
      border-bottom: 1px solid var(--accent);
      padding: 0.7rem 3rem;
      display: none;
      align-items: center;
      gap: 1rem;
      flex-wrap: wrap;
    }

    #compare-bar.visible {
      display: flex;
    }

    .compare-bar-label {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.65rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--accent);
    }

    .selected-pills {
      display: flex;
      gap: 0.4rem;
      flex-wrap: wrap;
      flex: 1;
    }

    .selected-pill {
      font-size: 0.75rem;
      background: var(--tag-bg);
      border: 1px solid var(--accent);
      border-radius: 999px;
      padding: 0.2rem 0.7rem;
      color: var(--accent);
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }

    .selected-pill button {
      background: none;
      border: none;
      color: var(--accent);
      cursor: pointer;
      font-size: 0.75rem;
      padding: 0;
      line-height: 1;
    }

    .compare-actions {
      display: flex;
      gap: 0.5rem;
      align-items: center;
      margin-left: auto;
    }

    .compare-btn {
      background: var(--accent);
      border-color: var(--accent);
      color: #0d0d0f;
      font-weight: 500;
      padding: 0.45rem 1rem;
      border-radius: 6px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.82rem;
      cursor: pointer;
      border: 1px solid var(--accent);
      transition: background 0.15s;
    }

    .compare-btn:hover {
      background: #d4b87e;
    }

    .clear-btn {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
      padding: 0.45rem 0.8rem;
      border-radius: 6px;
      font-size: 0.82rem;
      cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      transition: color 0.15s;
    }

    .clear-btn:hover {
      color: var(--text);
    }

    /* ── Filter bar ── */
    #filter-bar {
      border-bottom: 1px solid var(--border);
    }

    .filter-row {
      display: flex;
      align-items: flex-start;
      gap: 0.75rem;
      padding: 0.6rem 3rem;
      border-bottom: 1px solid var(--border);
    }

    .filter-row:last-child {
      border-bottom: none;
    }

    .filter-row-label {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.6rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
      padding-top: 0.3rem;
      white-space: nowrap;
      min-width: 110px;
    }

    .filter-pills {
      display: flex;
      flex-wrap: wrap;
      gap: 0.4rem;
    }

    .filter-pill {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.65rem;
      padding: 0.25rem 0.65rem;
      border-radius: 999px;
      background: var(--tag-bg);
      border: 1px solid var(--tag-border);
      color: var(--muted);
      cursor: pointer;
      text-transform: lowercase;
      letter-spacing: 0.03em;
      transition: all 0.15s;
    }

    .filter-pill:hover {
      border-color: var(--accent2);
      color: var(--text);
    }

    .filter-pill.active {
      background: var(--accent2);
      border-color: var(--accent2);
      color: #fff;
    }

    /* ── Main grid ── */
    main {
      padding: 1.75rem 3rem 4rem;
    }

    #datasets-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(400px, 1fr));
      gap: 1rem;
    }

    /* ── Dataset card ── */
    .dataset-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      transition: border-color 0.2s, transform 0.2s;
      animation: fadeUp 0.3s ease both;
      position: relative;
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(10px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .dataset-card:hover {
      border-color: var(--border);
      transform: translateY(-2px);
    }

    .dataset-card.selected {
      border-color: var(--select-ring) !important;
      box-shadow: 0 0 0 1px var(--select-ring);
    }

    /* Selection checkbox overlay */
    .select-toggle {
      position: absolute;
      top: 0.75rem;
      right: 0.75rem;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      border: 1.5px solid var(--border);
      background: var(--surface2);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s;
      z-index: 2;
      font-size: 0.7rem;
      color: transparent;
    }

    .dataset-card.selected .select-toggle {
      background: var(--accent);
      border-color: var(--accent);
      color: #0d0d0f;
    }

    .card-header {
      padding: 1.2rem 1.4rem 0.9rem;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      user-select: none;
      padding-right: 2.5rem;
    }

    .card-meta {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 0.5rem;
      flex-wrap: wrap;
    }

    .year-badge {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.65rem;
      color: var(--accent);
      border: 1px solid var(--accent);
      padding: 0.1rem 0.45rem;
      border-radius: 4px;
      letter-spacing: 0.05em;
    }

    .venue-badge {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.65rem;
      color: var(--muted);
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    .card-title {
      font-family: 'Playfair Display', serif;
      font-size: 1rem;
      font-weight: 600;
      line-height: 1.3;
      color: var(--text);
      margin-bottom: 0.3rem;
    }

    .card-authors {
      font-size: 0.78rem;
      color: var(--muted);
      font-style: italic;
    }

    .card-dataset-types {
      display: flex;
      flex-wrap: wrap;
      gap: 0.35rem;
      padding: 0.65rem 1.4rem;
      border-bottom: 1px solid var(--border);
    }

    .dataset-type-pill {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.62rem;
      padding: 0.18rem 0.55rem;
      border-radius: 999px;
      background: var(--tag-bg);
      border: 1px solid var(--tag-border);
      color: var(--muted);
      text-transform: lowercase;
    }

    .card-sections {
      display: none;
      flex-direction: column;
    }

    .card-sections.open {
      display: flex;
    }

    .section {
      padding: 0.9rem 1.4rem;
      border-bottom: 1px solid var(--border);
    }

    .section:last-child {
      border-bottom: none;
    }

    .section-label {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.6rem;
      color: var(--accent2);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 0.45rem;
    }

    .section-text {
      font-size: 0.845rem;
      color: #b8b6b0;
      line-height: 1.72;
    }

    /* ── Labeled table (inside cards) ── */
    .labeled-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.82rem;
    }

    .labeled-table tr {
      border-bottom: 1px solid var(--border);
    }

    .labeled-table tr:last-child {
      border-bottom: none;
    }

    .labeled-table td {
      padding: 0.45rem 0.6rem;
      vertical-align: top;
      line-height: 1.6;
    }

    .labeled-table td.lt-label {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.68rem;
      color: var(--text);
      white-space: normal;
      padding-right: 1rem;
      min-width: 130px;
      max-width: 180px;
      font-weight: 500;
    }

    .labeled-table td.lt-desc {
      color: #b8b6b0;
    }

    .card-footer {
      padding: 0.65rem 1.4rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-top: 1px solid var(--border);
      background: var(--surface2);
    }

    .expand-hint {
      font-size: 0.72rem;
      color: var(--muted);
      display: flex;
      align-items: center;
      gap: 0.3rem;
      cursor: pointer;
      user-select: none;
      transition: color 0.15s;
    }

    .expand-hint:hover {
      color: var(--text);
    }

    .expand-arrow {
      transition: transform 0.2s;
      display: inline-block;
    }

    .dataset-link {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.65rem;
      color: var(--accent);
      text-decoration: none;
      letter-spacing: 0.03em;
      transition: opacity 0.15s;
    }

    .dataset-link:hover {
      opacity: 0.75;
    }

    /* ── Empty state ── */
    #empty {
      display: none;
      text-align: center;
      padding: 5rem 2rem;
      color: var(--muted);
    }

    #empty h3 {
      font-family: 'Playfair Display', serif;
      font-size: 1.3rem;
      margin-bottom: 0.5rem;
      color: var(--text);
    }

    /* ══════════════════════════════════════════════════════════
     COMPARE VIEW
  ══════════════════════════════════════════════════════════ */
    #compare-view {
      display: none;
      flex-direction: column;
      padding: 1.75rem 3rem 4rem;
      gap: 2rem;
    }

    #compare-view.active {
      display: flex;
    }

    main.compare-active {
      display: none;
    }

    .compare-header-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 1rem;
    }

    .compare-header-row h2 {
      font-family: 'Playfair Display', serif;
      font-size: 1.3rem;
      color: var(--text);
    }

    /* Field selector */
    .field-selector {
      display: flex;
      gap: 0.4rem;
      flex-wrap: wrap;
      align-items: center;
    }

    .field-selector-label {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.62rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-right: 0.2rem;
    }

    .field-toggle {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.65rem;
      padding: 0.25rem 0.65rem;
      border-radius: 999px;
      background: var(--tag-bg);
      border: 1px solid var(--tag-border);
      color: var(--muted);
      cursor: pointer;
      text-transform: lowercase;
      letter-spacing: 0.03em;
      transition: all 0.15s;
    }

    .field-toggle:hover {
      border-color: var(--accent2);
      color: var(--text);
    }

    .field-toggle.active {
      background: var(--accent2);
      border-color: var(--accent2);
      color: #fff;
    }

    .field-toggle.all-fields.active {
      background: var(--accent3);
      border-color: var(--accent3);
      color: #0d0d0f;
    }

    /* Comparison table */
    .compare-table-wrap {
      overflow-x: auto;
      border: 1px solid var(--border);
      border-radius: 10px;
    }

    .compare-table {
      width: 100%;
      border-collapse: collapse;
      min-width: 600px;
    }

    .compare-table th,
    .compare-table td {
      padding: 0.9rem 1.2rem;
      text-align: left;
      border-bottom: 1px solid var(--border);
      vertical-align: top;
    }

    .compare-table th {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.62rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
      background: var(--surface2);
      position: sticky;
      top: 0;
      white-space: nowrap;
    }

    .compare-table th.field-col {
      color: var(--accent2);
    }

    .compare-table tr:last-child td {
      border-bottom: none;
    }

    .compare-table td.field-name {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.65rem;
      color: var(--accent2);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      white-space: normal;
      background: var(--surface2);
      position: sticky;
      left: 0;
      border-right: 1px solid var(--border);
    }

    .compare-table td.dataset-cell {
      font-size: 0.845rem;
      color: #b8b6b0;
      line-height: 1.72;
      min-width: 260px;
      max-width: 380px;
    }

    .compare-table td.dataset-cell.meta-cell {
      color: var(--text);
      font-weight: 400;
    }

    .compare-table tr:hover td {
      background: var(--surface2);
    }

    .compare-table td.field-name {
      background: var(--surface2) !important;
    }

    .dataset-col-header {
      font-family: 'Playfair Display', serif;
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--text);
      display: block;
      margin-bottom: 0.2rem;
      font-style: normal;
    }

    .dataset-col-sub {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.6rem;
      color: var(--muted);
      display: block;
    }

    .back-btn {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
      padding: 0.45rem 0.9rem;
      border-radius: 6px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.82rem;
      cursor: pointer;
      transition: color 0.15s;
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }

    .back-btn:hover {
      color: var(--text);
      border-color: var(--text);
    }

    /* ── Responsive ── */
    @media (max-width: 600px) {

      header,
      #tag-bar,
      #compare-bar,
      main,
      #compare-view {
        padding-left: 1.25rem;
        padding-right: 1.25rem;
      }

      #datasets-grid {
        grid-template-columns: 1fr;
      }

      #search {
        width: 100%;
      }
    }
  </style>
</head>

<body>

  <header>
    <div class="header-left">
      <h1>Repurposed <span>Datasets</span></h1>
      <p class="dataset-count" id="count-label">Loading…</p>
    </div>
    <div class="controls">
      <div class="search-wrap">
        <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <circle cx="11" cy="11" r="8" />
          <path d="m21 21-4.35-4.35" />
        </svg>
        <input type="text" id="search" placeholder="Search datasets…">
      </div>
      <select id="sort">
        <option value="year-desc">Newest first</option>
        <option value="year-asc">Oldest first</option>
        <option value="title-asc">Title A–Z</option>
      </select>
    </div>
  </header>

  <!-- Selection / compare bar -->
  <div id="compare-bar">
    <span class="compare-bar-label">Selected</span>
    <div class="selected-pills" id="selected-pills"></div>
    <div class="compare-actions">
      <button class="clear-btn" onclick="clearSelection()">Clear</button>
      <button class="compare-btn" onclick="openCompareView()">Compare →</button>
    </div>
  </div>

  <div id="filter-bar">
    <div class="filter-row" id="filter-dataset_topic">
      <span class="filter-row-label">Dataset topic</span>
      <div class="filter-pills"></div>
    </div>
    <div class="filter-row" id="filter-limitations">
      <span class="filter-row-label">Limitations</span>
      <div class="filter-pills"></div>
    </div>
    <div class="filter-row" id="filter-transformations">
      <span class="filter-row-label">Transformations</span>
      <div class="filter-pills"></div>
    </div>
  </div>

  <!-- Dataset grid -->
  <main id="main-view">
    <div id="datasets-grid"></div>
    <div id="empty">
      <h3>No datasets found</h3>
      <p>Try a different search or filter.</p>
    </div>
  </main>

  <!-- Compare view -->
  <div id="compare-view">
    <div class="compare-header-row">
      <h2>Comparing <span id="compare-count">0</span> datasets</h2>
      <button class="back-btn" onclick="closeCompareView()">← Back to collection</button>
    </div>

    <!-- Field selector -->
    <div class="field-selector">
      <span class="field-selector-label">Fields</span>
      <button class="field-toggle all-fields active" onclick="toggleAllFields()">all fields</button>
    </div>

    <!-- Table -->
    <div class="compare-table-wrap">
      <table class="compare-table" id="compare-table"></table>
    </div>
  </div>

  <script src="datasets/datasets-data.js"></script>
  <script>
    // ── Config ────────────────────────────────────────────────────────────
    const FIELDS = [
      { key: 'description', label: 'Description', type: 'text' },
      { key: 'original_intent', label: 'Original Intent', type: 'table' },
      { key: 'transformations', label: 'Transformations', type: 'table' },
      { key: 'schema', label: 'Schema', type: 'table' },
      { key: 'limitations', label: 'Limitations', type: 'table' },
      { key: 'key_contributions', label: 'Key Contributions', type: 'text' },
      { key: 'notes', label: 'Notes', type: 'text' },
    ];

    const META_FIELDS = [
      { key: '_authors', label: 'Authors' },
      { key: '_dataset_topic', label: 'Dataset Topic' },
      { key: '_link', label: 'Link' },
    ];

    // ── State ─────────────────────────────────────────────────────────────
    let datasets = [];
    // activeFilters: set of values currently selected per category
    const activeFilters = {
      dataset_topic: new Set(),
      limitations: new Set(),
      transformations: new Set(),
    };
    let searchQuery = '';
    let selectedIds = new Set();
    let activeCompareFields = new Set([...META_FIELDS.map(f => f.key), ...FIELDS.map(f => f.key)]);

    // ── Load datasets ───────────────────────────────────────────────────────
    // datasets/datasets-data.js is loaded via <script> tag and sets window.DATASETS_DATA.
    // This works when opening index.html directly in any browser — no server needed.
    // Regenerate it whenever you add/remove a dataset: node generate-manifest.js
    function loadDatasets() {
      if (window.DATASETS_DATA && window.DATASETS_DATA.length) {
        datasets = window.DATASETS_DATA;
      } else {
        document.getElementById('count-label').textContent = 'run: node generate-manifest.js';
        console.error('DATASETS_DATA not found. Run: node generate-manifest.js');
        datasets = [];
      }
      render();
    }

    // ── Render ────────────────────────────────────────────────────────────
    function render() {
      const sortVal = document.getElementById('sort').value;
      // Build active filter sets
      const f_dt = activeFilters.dataset_topic;
      const f_lim = activeFilters.limitations;
      const f_tr = activeFilters.transformations;
      const anyFilters = f_dt.size || f_lim.size || f_tr.size;

      let list = datasets.filter(p => {
        // ── Filter logic: OR across all three categories ──
        if (anyFilters) {
          const matchDT = f_dt.size && (p.dataset_topic || []).some(t => f_dt.has(t.toLowerCase()));
          const matchLim = f_lim.size && (p.limitations || []).some(item => f_lim.has(item.label.toLowerCase()));
          const matchTr = f_tr.size && (p.transformations || []).some(item => f_tr.has(item.label.toLowerCase()));
          if (!matchDT && !matchLim && !matchTr) return false;
        }

        // ── Search ──
        const q = searchQuery.toLowerCase();
        if (!q) return true;
        return p.title.toLowerCase().includes(q)
          || (p.authors || []).join(' ').toLowerCase().includes(q)
          || (p.dataset_topic || []).join(' ').toLowerCase().includes(q)
          || FIELDS.some(f => {
            const v = p[f.key];
            if (!v) return false;
            if (Array.isArray(v)) return v.some(item =>
              (item.label || '').toLowerCase().includes(q) || (item.description || '').toLowerCase().includes(q)
            );
            return String(v).toLowerCase().includes(q);
          });
      });

      if (sortVal === 'year-desc') list.sort((a, b) => (b.year || 0) - (a.year || 0));
      if (sortVal === 'year-asc') list.sort((a, b) => (a.year || 0) - (b.year || 0));
      if (sortVal === 'title-asc') list.sort((a, b) => a.title.localeCompare(b.title));

      renderFilterBar();
      renderCards(list);
      updateCompareBar();

      const total = datasets.length;
      document.getElementById('count-label').textContent =
        `${list.length} of ${total} dataset${total !== 1 ? 's' : ''}`;
    }

    function renderFilterBar() {
      // dataset_topic — from array of strings
      const dtVals = [...new Set(datasets.flatMap(p => (p.dataset_topic || []).map(t => t.toLowerCase())))].sort();
      // limitations labels
      const limVals = [...new Set(datasets.flatMap(p => (p.limitations || []).map(item => item.label.toLowerCase())))].sort();
      // transformations labels
      const trVals = [...new Set(datasets.flatMap(p => (p.transformations || []).map(item => item.label.toLowerCase())))].sort();

      function pillsHtml(vals, category) {
        return vals.map(v => {
          const isActive = activeFilters[category].has(v);
          return `<button class="filter-pill${isActive ? ' active' : ''}" onclick="toggleFilter('${category}','${v.replace(/'/g, "\'")}')">${escHtml(v)}</button>`;
        }).join('');
      }

      document.querySelector('#filter-dataset_topic .filter-pills').innerHTML = pillsHtml(dtVals, 'dataset_topic');
      document.querySelector('#filter-limitations .filter-pills').innerHTML = pillsHtml(limVals, 'limitations');
      document.querySelector('#filter-transformations .filter-pills').innerHTML = pillsHtml(trVals, 'transformations');
    }

    function renderCards(list) {
      const grid = document.getElementById('datasets-grid');
      const empty = document.getElementById('empty');
      if (!list.length) { grid.innerHTML = ''; empty.style.display = 'block'; return; }
      empty.style.display = 'none';

      grid.innerHTML = list.map((p, i) => {
        const isSelected = selectedIds.has(p.id);
        const sections = FIELDS
          .filter(f => p[f.key] && (!Array.isArray(p[f.key]) || p[f.key].length))
          .map(f => {
            let body;
            if (f.type === 'table' && Array.isArray(p[f.key])) {
              const rows = p[f.key].map(item =>
                `<tr>
              <td class="lt-label">${escHtml(item.label)}</td>
              <td class="lt-desc">${escHtml(item.description)}</td>
            </tr>`
              ).join('');
              body = `<table class="labeled-table">${rows}</table>`;
            } else {
              body = `<div class="section-text">${escHtml(p[f.key])}</div>`;
            }
            return `<div class="section">
          <div class="section-label">${f.label}</div>
          ${body}
        </div>`;
          }).join('');

        const datasetTypes = (p.dataset_topic || []).map(t => `<span class="dataset-type-pill">${escHtml(t)}</span>`).join('');
        const link = p.link
          ? `<a class="dataset-link" href="${escHtml(p.link)}" target="_blank" rel="noopener">source →</a>`
          : '<span></span>';

        return `
      <div class="dataset-card${isSelected ? ' selected' : ''}" id="card-${p.id}" style="animation-delay:${i * 0.035}s">
        <div class="select-toggle" onclick="toggleSelect('${p.id}')" title="Select for comparison">✓</div>
        <div class="card-header" onclick="toggleCard(this)">
          <div class="card-meta">
            ${p.year ? `<span class="year-badge">${p.year}</span>` : ''}
            ${p.venue ? `<span class="venue-badge">${escHtml(p.venue)}</span>` : ''}
          </div>
          <div class="card-title">${escHtml(p.title)}</div>
          ${(p.authors || []).length ? `<div class="card-authors">${(p.authors || []).join(', ')}</div>` : ''}
        </div>
        ${datasetTypes ? `<div class="card-dataset-types">${datasetTypes}</div>` : ''}
        <div class="card-sections">${sections}</div>
        <div class="card-footer">
          <div class="expand-hint" onclick="toggleCard(this.closest('.dataset-card').querySelector('.card-header'))">
            <span class="expand-arrow">▾</span>
            <span class="expand-text">expand</span>
          </div>
          ${link}
        </div>
      </div>`;
      }).join('');
    }

    function toggleCard(header) {
      const card = header.closest('.dataset-card');
      const sections = card.querySelector('.card-sections');
      const hint = card.querySelector('.expand-text');
      const arrow = card.querySelector('.expand-arrow');
      const isOpen = sections.classList.toggle('open');
      hint.textContent = isOpen ? 'collapse' : 'expand';
      arrow.style.transform = isOpen ? 'rotate(180deg)' : '';
    }

    // ── Selection ─────────────────────────────────────────────────────────
    function toggleSelect(id) {
      if (selectedIds.has(id)) selectedIds.delete(id);
      else selectedIds.add(id);
      const card = document.getElementById('card-' + id);
      if (card) card.classList.toggle('selected', selectedIds.has(id));
      updateCompareBar();
    }

    function clearSelection() {
      selectedIds.clear();
      document.querySelectorAll('.dataset-card.selected').forEach(c => c.classList.remove('selected'));
      updateCompareBar();
    }

    function updateCompareBar() {
      const bar = document.getElementById('compare-bar');
      const pills = document.getElementById('selected-pills');
      if (!selectedIds.size) { bar.classList.remove('visible'); return; }
      bar.classList.add('visible');

      pills.innerHTML = [...selectedIds].map(id => {
        const p = datasets.find(x => x.id === id);
        if (!p) return '';
        const short = p.title.length > 40 ? p.title.slice(0, 38) + '…' : p.title;
        return `<span class="selected-pill">${escHtml(short)}
      <button onclick="toggleSelect('${id}')" title="Remove">×</button>
    </span>`;
      }).join('');
    }

    // ── Filters ───────────────────────────────────────────────────────────
    function toggleFilter(category, value) {
      const s = activeFilters[category];
      if (s.has(value)) s.delete(value);
      else s.add(value);
      render();
    }
    document.getElementById('search').addEventListener('input', e => { searchQuery = e.target.value; render(); });
    document.getElementById('sort').addEventListener('change', render);

    // ══════════════════════════════════════════════════════════
    // COMPARE VIEW
    // ══════════════════════════════════════════════════════════

    function openCompareView() {
      if (!selectedIds.size) return;
      document.getElementById('main-view').classList.add('compare-active');
      document.getElementById('compare-view').classList.add('active');
      document.getElementById('compare-count').textContent = selectedIds.size;
      buildFieldToggles();
      buildCompareTable();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function closeCompareView() {
      document.getElementById('main-view').classList.remove('compare-active');
      document.getElementById('compare-view').classList.remove('active');
    }

    function buildFieldToggles() {
      const container = document.querySelector('.field-selector');
      // Remove old field toggles (keep label and "all fields")
      container.querySelectorAll('.field-toggle:not(.all-fields)').forEach(el => el.remove());

      const allF = [...META_FIELDS, ...FIELDS];
      allF.forEach(f => {
        const btn = document.createElement('button');
        btn.className = 'field-toggle' + (activeCompareFields.has(f.key) ? ' active' : '');
        btn.textContent = f.label.toLowerCase();
        btn.dataset.key = f.key;
        btn.onclick = () => toggleField(f.key, btn);
        container.appendChild(btn);
      });

      updateAllFieldsButton();
    }

    function toggleField(key, btn) {
      if (activeCompareFields.has(key)) activeCompareFields.delete(key);
      else activeCompareFields.add(key);
      btn.classList.toggle('active', activeCompareFields.has(key));
      updateAllFieldsButton();
      buildCompareTable();
    }

    function toggleAllFields() {
      const allF = [...META_FIELDS, ...FIELDS];
      const allActive = allF.every(f => activeCompareFields.has(f.key));
      if (allActive) {
        // deselect all
        activeCompareFields.clear();
        document.querySelectorAll('.field-toggle:not(.all-fields)').forEach(b => b.classList.remove('active'));
      } else {
        // select all
        allF.forEach(f => activeCompareFields.add(f.key));
        document.querySelectorAll('.field-toggle:not(.all-fields)').forEach(b => b.classList.add('active'));
      }
      updateAllFieldsButton();
      buildCompareTable();
    }

    function updateAllFieldsButton() {
      const allF = [...META_FIELDS, ...FIELDS];
      const allActive = allF.every(f => activeCompareFields.has(f.key));
      document.querySelector('.field-toggle.all-fields').classList.toggle('active', allActive);
    }

    function buildCompareTable() {
      const selectedDatasets = [...selectedIds].map(id => datasets.find(p => p.id === id)).filter(Boolean);
      const table = document.getElementById('compare-table');
      const allF = [...META_FIELDS, ...FIELDS].filter(f => activeCompareFields.has(f.key));

      // Header row: field col + one col per dataset
      let html = `<thead><tr>
    <th class="field-col">Field</th>
    ${selectedDatasets.map(p => `
      <th>
        <span class="dataset-col-header">${escHtml(truncate(p.title, 50))}</span>
        <span class="dataset-col-sub">${p.year || ''}${p.year && p.venue ? ' · ' : ''}${p.venue || ''}</span>
      </th>`).join('')}
  </tr></thead><tbody>`;

      allF.forEach(f => {
        html += `<tr><td class="field-name">${f.label}</td>`;
        selectedDatasets.forEach(p => {
          let val = '';
          if (f.key === '_authors') val = (p.authors || []).join(', ') || '—';
          else if (f.key === '_dataset_topic') val = (p.dataset_topic || []).join(', ') || '—';
          else if (f.key === '_link') val = p.link ? `<a class="dataset-link" href="${escHtml(p.link)}" target="_blank" rel="noopener">${escHtml(p.link)}</a>` : '—';
          else if (Array.isArray(p[f.key]) && p[f.key].length) {
            val = '<table class="labeled-table">' +
              p[f.key].map(item =>
                `<tr><td class="lt-label">${escHtml(item.label)}</td><td class="lt-desc">${escHtml(item.description)}</td></tr>`
              ).join('') +
              '</table>';
          } else val = escHtml(p[f.key] || '—');
          const isMeta = f.key.startsWith('_');
          html += `<td class="dataset-cell${isMeta ? ' meta-cell' : ''}">${val}</td>`;
        });
        html += '</tr>';
      });

      html += '</tbody>';
      table.innerHTML = html;
    }

    // ── Utils ─────────────────────────────────────────────────────────────
    function escHtml(s) {
      return String(s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }
    function truncate(s, n) { return s.length > n ? s.slice(0, n - 1) + '…' : s; }

    loadDatasets();
  </script>
</body>
